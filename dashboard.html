<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImageBIT AI Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://www.paypal.com/sdk/js?client-id=YOUR_PAYPAL_CLIENT_ID&currency=USD"></script>
    
    <style>
        :root {
            --primary: #ff2e88;
            --primary-hover: #e62577;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { 
            background: var(--bg); 
            color: var(--text-main); 
            line-height: 1.6;
            background-image: radial-gradient(at 0% 0%, rgba(255, 46, 136, 0.05) 0px, transparent 50%), 
                              radial-gradient(at 100% 100%, rgba(255, 46, 136, 0.05) 0px, transparent 50%);
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 5%;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--border);
        }

        .plan-badge {
            background: #f1f5f9;
            color: var(--text-main);
            font-weight: 700;
            padding: 6px 16px;
            border-radius: 12px;
            font-size: 0.85rem;
            border: 1px solid var(--border);
        }

        .credits-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .credit-count {
            font-weight: 700;
            color: var(--primary);
            background: rgba(255, 46, 136, 0.1);
            padding: 6px 12px;
            border-radius: 8px;
        }

        .btn-buy {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .container {
            margin: 120px auto 60px;
            max-width: 800px;
            padding: 0 20px;
            text-align: center;
        }

        .generator-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05);
            border: 1px solid var(--border);
        }

        .input-group { margin-bottom: 20px; text-align: left; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.9rem; color: var(--text-muted); }

        input[type="text"], select {
            width: 100%;
            padding: 14px 18px;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: #fcfcfd;
        }

        .btn-generate {
            width: 100%;
            background: var(--text-main);
            color: white;
            padding: 16px;
            border: none;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
        }

        .output-box {
            margin: 30px auto;
            width: 100%;
            aspect-ratio: 1/1;
            max-width: 500px;
            background: #f1f5f9;
            border: 2px dashed var(--border);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Modal & PayPal Styles */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal {
            background: white;
            border-radius: 24px;
            padding: 32px;
            width: 100%;
            max-width: 440px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .price-option {
            display: flex;
            justify-content: space-between;
            padding: 16px;
            border: 2px solid var(--border);
            border-radius: 16px;
            margin-bottom: 12px;
            cursor: pointer;
            font-weight: 600;
        }

        .price-option.selected {
            border-color: var(--primary);
            background: rgba(255, 46, 136, 0.05);
        }

        #paypal-button-container {
            margin-top: 20px;
            display: none; /* Hidden until a package is selected */
        }

        .close-link { margin-top: 15px; display: block; color: var(--text-muted); cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="plan-badge" id="plan-badge">Free Plan</div>
    <div class="credits-info">
        <span class="credit-count" id="credits">0 Credits</span>
        <button class="btn-buy" onclick="showBuyCredits()">Buy Credits</button>
    </div>
</div>

<div class="container">
    <h1>Create Masterpieces</h1>
    <p class="subtitle">Turn text into high-quality AI images in seconds.</p>
    
    <div class="generator-card">
        <div class="input-group">
            <label>Describe your vision</label>
            <input type="text" id="prompt" placeholder="A futuristic city in the style of cyberpunk...">
        </div>
        
        <div class="input-group">
            <label>Output Quality</label>
            <select id="resolution">
                <option value="5">Standard Image (5 credits)</option>
                <option value="10">4K Ultra Quality (10 credits)</option>
            </select>
        </div>
        
        <button class="btn-generate" onclick="generateImage()" id="gen-btn">Generate Image</button>
    </div>

    <div class="output-box" id="output-box">
        <div class="placeholder" id="placeholder-text">Your generated image will appear here</div>
    </div>
</div>

<div class="modal-overlay" id="modal">
    <div class="modal">
        <h3>Refill Credits</h3>
        
        <div class="price-option" onclick="selectPackage(10, 0.59, this)">
            <span>10 Credits</span>
            <span>$0.59</span>
        </div>
        
        <div class="price-option" onclick="selectPackage(50, 1.39, this)">
            <span>50 Credits</span>
            <span>$1.39</span>
        </div>
        
        <div class="price-option" onclick="selectPackage(100, 3.00, this)">
            <span>100 Credits</span>
            <span>$3.00</span>
        </div>

        <div id="paypal-button-container"></div>
        
        <span class="close-link" onclick="closeModal()">Maybe later</span>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDr6R3e_oGeLb02blsH2l9cDJZZBwVegOk",
        authDomain: "imagebit-8fe75.firebaseapp.com",
        projectId: "imagebit-8fe75",
        storageBucket: "imagebit-8fe75.appspot.com",
        messagingSenderId: "326104098599",
        appId: "1:326104098599:web:f2d3447a6211f2104e6b02"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const creditsSpan = document.getElementById('credits');
    const planBadge = document.getElementById('plan-badge');

    let selectedPackageData = null;

    onAuthStateChanged(auth, async (user) => {
        if(!user){ window.location.href="login.html"; return; }
        const userRef = doc(db, "users", user.uid);
        const userSnap = await getDoc(userRef);
        if(userSnap.exists()){
            updateUI(userSnap.data().credits, userSnap.data().plan);
        } else {
            await setDoc(userRef, { credits: 20, plan: "Free" });
            updateUI(20, "Free");
        }
    });

    function updateUI(credits, plan) {
        creditsSpan.innerText = `${credits} Credits`;
        planBadge.innerText = `${plan} Plan`;
    }

    window.showBuyCredits = () => document.getElementById('modal').style.display='flex';
    window.closeModal = () => {
        document.getElementById('modal').style.display='none';
        document.getElementById('paypal-button-container').style.display = 'none';
        document.querySelectorAll('.price-option').forEach(el => el.classList.remove('selected'));
    };

    // --- PAYPAL INTEGRATION ---
    window.selectPackage = (amount, price, element) => {
        selectedPackageData = { amount, price };
        
        // UI Selection
        document.querySelectorAll('.price-option').forEach(el => el.classList.remove('selected'));
        element.classList.add('selected');
        
        const container = document.getElementById('paypal-button-container');
        container.style.display = 'block';
        container.innerHTML = ''; // Clear previous button

        paypal.Buttons({
            createOrder: (data, actions) => {
                return actions.order.create({
                    purchase_units: [{
                        amount: { value: price.toString() },
                        description: `${amount} ImageBIT Credits`
                    }]
                });
            },
            onApprove: async (data, actions) => {
                return actions.order.capture().then(async (details) => {
                    await finalizePurchase(amount);
                });
            },
            onError: (err) => {
                alert("Payment failed. Please try again.");
            }
        }).render('#paypal-button-container');
    };

    async function finalizePurchase(amount) {
        const user = auth.currentUser;
        const userRef = doc(db, "users", user.uid);
        await updateDoc(userRef, { credits: increment(amount) });
        
        const snap = await getDoc(userRef);
        updateUI(snap.data().credits, snap.data().plan);
        
        alert(`Success! ${amount} credits added to your account.`);
        window.closeModal();
    }

    // --- GENERATION LOGIC (CLEANED) ---
    window.generateImage = async () => {
        const prompt = document.getElementById('prompt').value;
        const btn = document.getElementById('gen-btn');
        const cost = parseInt(document.getElementById('resolution').value);

        if(!prompt){ alert('Enter a prompt first!'); return; }

        const user = auth.currentUser;
        const userRef = doc(db, "users", user.uid);
        const userSnap = await getDoc(userRef);
        let currentCredits = userSnap.data().credits;

        if(currentCredits < cost){ 
            alert(`Insufficient credits! You need ${cost} for this.`);
            window.showBuyCredits();
            return; 
        }

        // Processing UI
        btn.innerText = "Processing...";
        btn.disabled = true;
        document.getElementById('placeholder-text').innerHTML = `
            <div style="text-align:center;">
                <p><b>Credits Deducted!</b></p>
                <p style="font-size:0.8rem; color:var(--text-muted);">The backend is not yet connected. <br> Your request: "${prompt}"</p>
            </div>
        `;

        try {
            // Deduct Credits
            await updateDoc(userRef, { credits: increment(-cost) });
            updateUI(currentCredits - cost, userSnap.data().plan);
            
            // Note: No random images will appear now.
            setTimeout(() => {
                btn.innerText = "Generate Image";
                btn.disabled = false;
            }, 2000);

        } catch (err) {
            alert("Error updating credits.");
            btn.innerText = "Generate Image";
            btn.disabled = false;
        }
    };
</script>
</body>
</html>
