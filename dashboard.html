<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImageBIT AI Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff2e88;
            --primary-hover: #e62577;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { 
            background: var(--bg); 
            color: var(--text-main); 
            line-height: 1.6;
            background-image: radial-gradient(at 0% 0%, rgba(255, 46, 136, 0.05) 0px, transparent 50%), 
                              radial-gradient(at 100% 100%, rgba(255, 46, 136, 0.05) 0px, transparent 50%);
        }

        /* Top Navigation */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 5%;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--border);
        }

        .plan-badge {
            background: #f1f5f9;
            color: var(--text-main);
            font-weight: 700;
            padding: 6px 16px;
            border-radius: 12px;
            font-size: 0.85rem;
            border: 1px solid var(--border);
        }

        .credits-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .credit-count {
            font-weight: 700;
            color: var(--primary);
            background: rgba(255, 46, 136, 0.1);
            padding: 6px 12px;
            border-radius: 8px;
        }

        .btn-buy {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .btn-buy:hover { background: var(--primary-hover); transform: translateY(-1px); }

        /* Main Generator UI */
        .container {
            margin: 120px auto 60px;
            max-width: 800px;
            padding: 0 20px;
            text-align: center;
        }

        h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 10px; letter-spacing: -1px; }
        p.subtitle { color: var(--text-muted); margin-bottom: 30px; }

        .generator-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05), 0 8px 10px -6px rgba(0,0,0,0.05);
            border: 1px solid var(--border);
        }

        .input-group { margin-bottom: 20px; text-align: left; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.9rem; color: var(--text-muted); }

        input[type="text"], select {
            width: 100%;
            padding: 14px 18px;
            border-radius: 14px;
            border: 1px solid var(--border);
            font-size: 1rem;
            background: #fcfcfd;
            transition: 0.2s;
        }

        input:focus, select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(255, 46, 136, 0.1); }

        .btn-generate {
            width: 100%;
            background: var(--text-main);
            color: white;
            padding: 16px;
            border: none;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-generate:hover { background: #000; transform: scale(1.01); }

        /* Output Preview */
        .output-box {
            margin-top: 30px;
            width: 100%;
            aspect-ratio: 1/1;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
            background: #f1f5f9;
            border: 2px dashed var(--border);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .output-box img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .placeholder { color: var(--text-muted); font-weight: 500; padding: 20px; }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal {
            background: white;
            border-radius: 24px;
            padding: 32px;
            width: 100%;
            max-width: 440px;
            position: relative;
        }

        .modal h3 { font-size: 1.5rem; margin-bottom: 24px; }

        .price-option {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            border: 2px solid var(--border);
            border-radius: 16px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: 0.2s;
            font-weight: 600;
        }

        .price-option:hover { border-color: var(--primary); background: rgba(255, 46, 136, 0.02); }
        .price-option.featured { border-color: var(--primary); background: rgba(255, 46, 136, 0.05); position: relative; }
        .price-option.featured::after {
            content: "MEGA OFFER";
            position: absolute;
            top: -10px; right: 15px;
            background: var(--primary);
            color: white; font-size: 0.65rem;
            padding: 2px 8px; border-radius: 4px;
        }

        .close-link { margin-top: 15px; display: inline-block; color: var(--text-muted); cursor: pointer; font-size: 0.9rem; text-decoration: underline; }

        @media (max-width: 600px) {
            .top-bar { padding: 10px 15px; }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="plan-badge" id="plan-badge">Free Plan</div>
    <div class="credits-info">
        <span class="credit-count" id="credits">0 Credits</span>
        <button class="btn-buy" onclick="showBuyCredits()">Buy Credits</button>
    </div>
</div>

<div class="container">
    <h1>Create Masterpieces</h1>
    <p class="subtitle">Turn text into high-quality AI images in seconds.</p>
    
    <div class="generator-card">
        <div class="input-group">
            <label>Describe your vision</label>
            <input type="text" id="prompt" placeholder="A futuristic city in the style of cyberpunk...">
        </div>
        
        <div class="input-group">
            <label>Output Quality</label>
            <select id="resolution">
                <option value="5">Standard Image (5 credits)</option>
                <option value="10">4K Ultra Quality (10 credits)</option>
            </select>
        </div>
        
        <button class="btn-generate" onclick="generateImage()" id="gen-btn">Generate Image</button>
    </div>

    <div class="output-box" id="output-box">
        <div class="placeholder" id="placeholder-text">Your generated image will appear here</div>
        <img id="result" alt="Generated Image">
    </div>
</div>

<div class="modal-overlay" id="modal">
    <div class="modal">
        <h3>Refill Credits</h3>
        
        <div class="price-option" onclick="buyCredits(10, 0.59)">
            <span>10 Credits</span>
            <span>$0.59</span>
        </div>
        
        <div class="price-option featured" onclick="buyCredits(50, 1.39)">
            <span>50 Credits</span>
            <span>$1.39</span>
        </div>
        
        <div class="price-option" onclick="buyCredits(100, 3.00)">
            <span>100 Credits</span>
            <span>$3.00</span>
        </div>

        <div style="margin: 20px 0; border-top: 1px solid var(--border); padding-top: 20px;">
            <div class="price-option" onclick="subscribePro()" style="background: #1e293b; color: white; border: none;">
                <div style="text-align: left;">
                    <div style="font-size: 1rem;">Pro Subscription</div>
                    <div style="font-size: 0.75rem; opacity: 0.8; font-weight: 400;">150 Credits/mo + Faster API</div>
                </div>
                <span>$5.99</span>
            </div>
        </div>
        
        <span class="close-link" onclick="closeModal()">Maybe later</span>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDr6R3e_oGeLb02blsH2l9cDJZZBwVegOk",
        authDomain: "imagebit-8fe75.firebaseapp.com",
        projectId: "imagebit-8fe75",
        storageBucket: "imagebit-8fe75.appspot.com",
        messagingSenderId: "326104098599",
        appId: "1:326104098599:web:f2d3447a6211f2104e6b02",
        measurementId: "G-4L17LE3VH8"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const creditsSpan = document.getElementById('credits');
    const planBadge = document.getElementById('plan-badge');

    // Sync Auth State
    onAuthStateChanged(auth, async (user) => {
        if(!user){ window.location.href="login.html"; return; }

        const userRef = doc(db, "users", user.uid);
        const userSnap = await getDoc(userRef);

        if(userSnap.exists()){
            updateUI(userSnap.data().credits, userSnap.data().plan);
        } else {
            await setDoc(userRef, { credits: 20, plan: "Free" });
            updateUI(20, "Free");
        }
    });

    function updateUI(credits, plan) {
        creditsSpan.innerText = `${credits} Credits`;
        planBadge.innerText = `${plan} Plan`;
    }

    // Modal Controls
    window.showBuyCredits = () => document.getElementById('modal').style.display='flex';
    window.closeModal = () => document.getElementById('modal').style.display='none';

    // Credit Purchase System
    window.buyCredits = async (amount, price) => {
        const user = auth.currentUser;
        if(!user) return;

        const userRef = doc(db, "users", user.uid);
        
        try {
            // Using increment to avoid data overwriting issues
            await updateDoc(userRef, { 
                credits: increment(amount) 
            });
            
            const snap = await getDoc(userRef);
            updateUI(snap.data().credits, snap.data().plan);
            
            alert(`Payment Success! ${amount} credits added for $${price}.`);
            window.closeModal();
        } catch (e) {
            alert("Error processing payment.");
        }
    };

    // AI Generation Logic (Credit-Gated)
    window.generateImage = async () => {
        const prompt = document.getElementById('prompt').value;
        const btn = document.getElementById('gen-btn');
        const cost = parseInt(document.getElementById('resolution').value);

        if(!prompt){ alert('Enter a prompt first!'); return; }

        const user = auth.currentUser;
        const userRef = doc(db, "users", user.uid);
        const userSnap = await getDoc(userRef);
        let currentCredits = userSnap.data().credits;

        if(currentCredits < cost){ 
            alert(`Insufficient credits! You need ${cost} for this generation.`);
            window.showBuyCredits();
            return; 
        }

        // Processing State
        btn.innerText = "Connecting to AI API...";
        btn.disabled = true;
        document.getElementById('placeholder-text').innerText = "Working on your image... Credits will be deducted shortly.";

        try {
            /* BACKEND HOOK:
               Add your fetch() call to OpenAI/Stable Diffusion here.
            */

            // Deduct Credits
            await updateDoc(userRef, { 
                credits: increment(-cost) 
            });
            updateUI(currentCredits - cost, userSnap.data().plan);

            // Simulation of response
            setTimeout(() => {
                document.getElementById('placeholder-text').innerHTML = 
                    `<div style="color:var(--primary); font-weight:700;">API Ready for Connection</div>
                     <p style="font-size:0.85rem; margin-top:10px;">Credits deducted. Set 'img.src' to your AI URL here.</p>`;
                btn.innerText = "Generate Image";
                btn.disabled = false;
            }, 1500);

        } catch (err) {
            alert("API Error. No credits were taken.");
            btn.innerText = "Generate Image";
            btn.disabled = false;
        }
    };

    window.subscribePro = async () => {
        const user = auth.currentUser;
        const userRef = doc(db, "users", user.uid);
        await updateDoc(userRef, { 
            plan: "Pro", 
            credits: increment(150) 
        });
        const snap = await getDoc(userRef);
        updateUI(snap.data().credits, "Pro");
        alert("Subscribed to Pro Plan!");
        window.closeModal();
    };
</script>

</body>
</html>
