<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImageBIT | Final v4</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --pink: #ff2e88; --blue: #3b82f6; --bg: #f8fafc; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: #1e293b; }

        /* --- Header & User Info --- */
        .nav { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 20px; height: 70px; background: white; border-bottom: 1px solid #e2e8f0; 
            position: fixed; width: 100%; top: 0; z-index: 100; 
        }
        .user-box { display: flex; align-items: center; gap: 10px; margin-left: 50px; }
        .user-pfp { width: 38px; height: 38px; border-radius: 50%; border: 2px solid var(--pink); object-fit: cover; }
        .user-name { font-weight: 800; font-size: 0.9rem; }
        .cred-badge { background: #fff1f6; color: var(--pink); padding: 6px 12px; border-radius: 10px; font-weight: 800; font-size: 0.85rem; }

        /* --- Sidebar & Reward --- */
        .gift-btn { position: fixed; top: 12px; left: 15px; z-index: 1001; font-size: 22px; cursor: pointer; background: white; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .sidebar { position: fixed; top: 0; left: -320px; width: 300px; height: 100%; background: white; z-index: 1002; transition: 0.3s ease-out; padding: 100px 20px; border-right: 1px solid #e2e8f0; }
        .sidebar.open { left: 0; }
        
        .reward-card { background: #fff5f9; padding: 25px; border-radius: 20px; text-align: center; border: 1px solid #ffebf3; position: relative; overflow: hidden; }
        
        /* THE TICK ANIMATION */
        #tick { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); 
            font-size: 60px; opacity: 0; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        .tick-active { transform: translate(-50%, -50%) scale(1.2) !important; opacity: 1 !important; }

        /* --- Main Content --- */
        .container { margin-top: 120px; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .welcome-text { font-size: 2rem; font-weight: 800; margin-bottom: 5px; }
        .sub-text { color: #64748b; margin-bottom: 30px; }
        
        .btn { background: var(--pink); color: white; border: none; padding: 14px 24px; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.2s; width: 100%; }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn:disabled { background: #cbd5e1; cursor: not-allowed; }

        #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.2); z-index: 1000; }
    </style>
</head>
<body>

<div id="overlay" onclick="toggleSidebar()"></div>
<div class="gift-btn" onclick="toggleSidebar()">🎁</div>

<nav class="nav">
    <div class="user-box">
        <img src="" id="nav-pfp" class="user-pfp">
        <div class="user-name" id="nav-name">...</div>
    </div>
    <div class="cred-badge" id="nav-creds">0 Credits</div>
</nav>

<div class="sidebar" id="sidebar">
    <div class="reward-card">
        <div id="tick">✅</div>
        <div id="reward-content">
            <h3 style="margin-bottom:10px;">Daily Bonus</h3>
            <p style="font-size: 13px; color: #64748b; margin-bottom: 20px;">Claim 5 free credits!</p>
            <button class="btn" id="claim-btn" onclick="claim()">Claim Credits</button>
        </div>
    </div>
</div>

<main class="container">
    <h1 class="welcome-text">Hey, <span id="user-greeting">Artist</span>!</h1>
    <p class="sub-text">ImageBIT v4 is ready for action.</p>
    
    <div style="width: 100%; max-width: 400px; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.03);">
        <p style="font-weight: 800; margin-bottom: 15px;">Your Balance</p>
        <div style="font-size: 2.5rem; font-weight: 800; color: var(--pink);" id="hero-creds">--</div>
        <p style="font-size: 12px; color: #94a3b8; margin-top: 5px;">Credits refresh every 24 hours</p>
    </div>
</main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, updateDoc, increment, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDr6R3e_oGeLb02blsH2l9cDJZZBwVegOk",
        authDomain: "imagebit-8fe75.firebaseapp.com",
        projectId: "imagebit-8fe75",
        appId: "1:326104098599:web:f2d3447a6211f2104e6b02"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    onAuthStateChanged(auth, async (user) => {
        if (!user) { window.location.href = "login.html"; return; }
        
        const snap = await getDoc(doc(db, "users", user.uid));
        if (snap.exists()) {
            const data = snap.data();
            // Update UI with Firebase Data
            document.getElementById('nav-name').innerText = data.displayName || "User";
            document.getElementById('user-greeting').innerText = data.displayName || "Artist";
            document.getElementById('nav-pfp').src = data.pfp || `https://api.dicebear.com/7.x/avataaars/svg?seed=${user.uid}`;
            document.getElementById('nav-creds').innerText = data.credits + " Credits";
            document.getElementById('hero-creds').innerText = data.credits;
            
            // Check Cooldown
            if (data.lastClaim) {
                const diff = Date.now() - data.lastClaim.toMillis();
                if (diff < 24 * 60 * 60 * 1000) {
                    document.getElementById('claim-btn').disabled = true;
                    document.getElementById('claim-btn').innerText = "Come back tomorrow";
                }
            }
        }
    });

    window.toggleSidebar = () => {
        const sb = document.getElementById('sidebar');
        const ov = document.getElementById('overlay');
        sb.classList.toggle('open');
        ov.style.display = sb.classList.contains('open') ? 'block' : 'none';
    };

    window.claim = async () => {
        const btn = document.getElementById('claim-btn');
        btn.disabled = true;
        
        try {
            await updateDoc(doc(db, "users", auth.currentUser.uid), {
                credits: increment(5),
                lastClaim: serverTimestamp()
            });

            // FLYING TICK ANIMATION
            document.getElementById('reward-content').style.opacity = '0';
            document.getElementById('tick').classList.add('tick-active');
            
            setTimeout(() => location.reload(), 1200);
        } catch (e) {
            alert("Error! Try again.");
            btn.disabled = false;
        }
    };
</script>
</body>
</html>
