<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImageBIT AI | v4 PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ff2e88; --accent: #3b82f6; --bg: #fdfdff; --glass: rgba(255, 255, 255, 0.7); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: #1e293b; overflow-x: hidden; background-image: radial-gradient(circle at top right, #fff0f6, transparent), radial-gradient(circle at bottom left, #f0f7ff, transparent); min-height: 100vh; }

        /* Premium Navigation */
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 0 5%; height: 80px; background: var(--glass); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(0,0,0,0.05); position: fixed; width: 100%; top: 0; z-index: 100; }
        .logo { font-weight: 800; font-size: 1.4rem; letter-spacing: -0.5px; display: flex; align-items: center; gap: 8px; }
        .pro-badge { background: linear-gradient(45deg, var(--primary), #ff7eb3); color: white; font-size: 10px; padding: 4px 10px; border-radius: 20px; text-transform: uppercase; font-weight: 800; }
        
        /* Sidebar & Flying Tick */
        .gift-trigger { position: fixed; top: 18px; left: 20px; z-index: 1001; font-size: 24px; cursor: pointer; background: white; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; border-radius: 14px; box-shadow: 0 8px 20px rgba(0,0,0,0.06); transition: 0.3s; }
        .gift-trigger:hover { transform: translateY(-3px) rotate(10deg); }
        .sidebar { position: fixed; top: 0; left: -350px; width: 320px; height: 100%; background: white; z-index: 1002; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); padding: 110px 25px; box-shadow: 20px 0 60px rgba(0,0,0,0.05); }
        .sidebar.open { left: 0; }
        .reward-box { background: linear-gradient(135deg, #fff5f9 0%, #f0f7ff 100%); padding: 35px 25px; border-radius: 30px; text-align: center; border: 1px solid rgba(255,46,136,0.1); position: relative; overflow: hidden; }
        
        /* THE FLYING TICK */
        .success-tick { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); font-size: 80px; opacity: 0; transition: 0.7s cubic-bezier(0.34, 1.56, 0.64, 1); pointer-events: none; }
        .tick-fly { transform: translate(-50%, -50%) scale(1.2) !important; opacity: 1 !important; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.1)); }

        /* Main Dashboard UI */
        .container { margin: 130px auto 60px; max-width: 650px; padding: 0 20px; }
        .main-card { background: white; padding: 40px; border-radius: 35px; box-shadow: 0 20px 50px rgba(0,0,0,0.04); border: 1px solid rgba(0,0,0,0.02); }
        .input-group { position: relative; margin-bottom: 25px; }
        input { width: 100%; padding: 22px 25px; border-radius: 20px; border: 1px solid #edf2f7; font-size: 1.05rem; outline: none; transition: 0.4s; background: #f8fafc; }
        input:focus { border-color: var(--accent); background: white; box-shadow: 0 0 0 5px rgba(59,130,246,0.1); }
        .btn-gen { width: 100%; background: #111; color: white; padding: 20px; border: none; border-radius: 20px; font-weight: 700; font-size: 1.1rem; cursor: pointer; transition: 0.3s; box-shadow: 0 10px 25px rgba(0,0,0,0.15); }
        .btn-gen:hover { transform: translateY(-2px); box-shadow: 0 15px 30px rgba(0,0,0,0.2); }
        .btn-gen:disabled { background: #cbd5e1; transform: none; cursor: wait; }

        /* Smart Progress Bar */
        #loader-ui { display: none; margin-bottom: 30px; }
        .bar-container { width: 100%; height: 10px; background: #f1f5f9; border-radius: 50px; overflow: hidden; position: relative; }
        .bar-fill { width: 0%; height: 100%; background: linear-gradient(90deg, var(--accent), #60a5fa); transition: width 0.4s ease; border-radius: 50px; }
        .status-badge { display: inline-block; padding: 6px 14px; background: #eff6ff; color: var(--accent); border-radius: 10px; font-size: 12px; font-weight: 800; margin-bottom: 12px; }

        /* Output Canvas */
        .art-canvas { width: 100%; aspect-ratio: 1/1; background: #f8fafc; border-radius: 40px; margin-top: 35px; overflow: hidden; position: relative; border: 2px dashed #e2e8f0; display: flex; align-items: center; justify-content: center; transition: 0.5s; }
        #output-img { width: 100%; height: 100%; object-fit: cover; display: none; transition: 0.5s ease-in; }
        
        .shimmer-effect { background: linear-gradient(90deg, #f8fafc 25%, #f1f5f9 50%, #f8fafc 75%); background-size: 200% 100%; animation: loading-shimmer 1.5s infinite linear; }
        @keyframes loading-shimmer { to { background-position: -200% 0; } }
    </style>
</head>
<body>

<div class="gift-trigger" onclick="toggleSidebar()">🎁</div>

<div class="top-bar">
    <div class="logo" style="margin-left:60px;">
        <span>ImageBIT</span> <span class="pro-badge">v4 PRO</span>
    </div>
    <div id="credits" style="font-weight:900; color:var(--primary); background:rgba(255,46,136,0.08); padding:10px 20px; border-radius:15px; border:1px solid rgba(255,46,136,0.1);">... Credits</div>
</div>

<div class="sidebar" id="sidebar">
    <div class="reward-box">
        <div class="success-tick" id="tick-icon">✅</div>
        <div id="reward-content">
            <h2 style="font-weight:800; margin-bottom:10px;">Daily Drop</h2>
            <p style="font-size:14px; color:#64748b; margin-bottom:25px;">Fuel your imagination with 5 free daily credits.</p>
            <button class="btn-gen" onclick="claimDaily()" style="background:var(--primary); font-size:15px; padding:15px;">Claim Now</button>
        </div>
    </div>
</div>

<div class="container">
    <div class="main-card">
        <div id="loader-ui">
            <span class="status-badge" id="status-text">Waking up AI v4...</span>
            <div class="bar-container"><div class="bar-fill" id="bar-fill"></div></div>
        </div>
        <div class="input-group">
            <input type="text" id="prompt-input" placeholder="A futuristic cyberpunk city at sunset, 8k...">
        </div>
        <button class="btn-gen" id="gen-btn" onclick="generateArt()">
            Generate Art <span style="opacity:0.5; margin-left:8px; font-weight:400;">(5 Credits)</span>
        </button>
    </div>
    
    <div class="art-canvas" id="canvas">
        <img src="" id="output-img">
        <div id="placeholder" style="text-align:center; color:#94a3b8; font-weight:700;">
            <p style="font-size:1.1rem;">Ready for your prompt</p>
            <p style="font-size:0.8rem; font-weight:500; margin-top:5px;">AI v4 Turbo Model Active</p>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDr6R3e_oGeLb02blsH2l9cDJZZBwVegOk",
        authDomain: "imagebit-8fe75.firebaseapp.com",
        projectId: "imagebit-8fe75",
        storageBucket: "imagebit-8fe75.appspot.com",
        appId: "1:326104098599:web:f2d3447a6211f2104e6b02"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    onAuthStateChanged(auth, async (user) => {
        if (!user) window.location.href = "login.html";
        else {
            const snap = await getDoc(doc(db, "users", user.uid));
            if(snap.exists()) document.getElementById('credits').innerText = snap.data().credits + " Credits";
        }
    });

    window.toggleSidebar = () => document.getElementById('sidebar').classList.toggle('open');

    window.claimDaily = async () => {
        const userRef = doc(db, "users", auth.currentUser.uid);
        await updateDoc(userRef, { credits: increment(5) });
        document.getElementById('reward-content').style.opacity = '0';
        document.getElementById('tick-icon').classList.add('tick-fly');
        setTimeout(() => location.reload(), 1400);
    };

    // --- SEQUENTIAL FAILOVER ENGINE ---
    window.generateArt = async () => {
        const prompt = document.getElementById('prompt-input').value.trim();
        if(!prompt) return alert("Please enter a prompt!");

        const btn = document.getElementById('gen-btn');
        const img = document.getElementById('output-img');
        const fill = document.getElementById('bar-fill');
        const canvas = document.getElementById('canvas');
        const status = document.getElementById('status-text');

        btn.disabled = true;
        document.getElementById('loader-ui').style.display = "block";
        canvas.classList.add('shimmer-effect');
        img.style.display = "none";
        document.getElementById('placeholder').style.display = "none";

        let p = 0;
        const progress = setInterval(() => {
            if(p < 92) { // Only go to 92 until loaded
                p += (100 - p) * 0.08;
                fill.style.width = p + "%";
                if(p > 30) status.innerText = "Applying 8k Textures...";
                if(p > 60) status.innerText = "Finalizing Lighting...";
            }
        }, 400);

        const seed = Math.floor(Math.random() * 999999);
        // Primary Endpoint (High Def)
        const primary = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?width=1024&height=1024&seed=${seed}&nologo=true&model=flux`;
        
        const tryImage = (url) => {
            return new Promise((resolve, reject) => {
                const testImg = new Image();
                testImg.src = url;
                testImg.onload = () => resolve(url);
                testImg.onerror = () => reject();
            });
        };

        try {
            // Step 1: Try Primary
            status.innerText = "Connecting to Pro Node...";
            const activeUrl = await tryImage(primary).catch(() => {
                // Step 2: Fallback to Turbo Node if Pro is busy
                status.innerText = "Pro Node busy. Switching to Turbo...";
                return tryImage(`https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?width=768&height=768&seed=${seed}&model=turbo`);
            });

            clearInterval(progress);
            fill.style.width = "100%";
            status.innerText = "Complete!";
            
            img.src = activeUrl;
            await updateDoc(doc(db, "users", auth.currentUser.uid), { credits: increment(-5) });

            setTimeout(() => {
                canvas.classList.remove('shimmer-effect');
                img.style.display = "block";
                document.getElementById('loader-ui').style.display = "none";
                btn.disabled = false;
            }, 500);

        } catch (err) {
            clearInterval(progress);
            alert("The AI servers are overloaded. Please try a simpler prompt in 10 seconds!");
            btn.disabled = false;
            location.reload();
        }
    };
</script>
</body>
</html>
