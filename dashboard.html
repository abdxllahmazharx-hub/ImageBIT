<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImageBIT AI | v4 PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ff2e88; --accent: #3b82f6; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; }

        /* --- UI COMPONENTS --- */
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 0 5%; height: 75px; background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(10px); border-bottom: 1px solid #334155; position: fixed; width: 100%; top: 0; z-index: 100; }
        .user-info { display: flex; align-items: center; gap: 12px; }
        .user-pfp { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--primary); object-fit: cover; }
        .user-name { font-weight: 800; font-size: 0.9rem; }
        .cred-badge { font-weight: 900; color: var(--primary); background: rgba(255,46,136,0.1); padding: 8px 16px; border-radius: 12px; transition: 0.3s; }
        .pulse { animation: pulse-animation 0.5s ease-in-out; }
        @keyframes pulse-animation { 0% { transform: scale(1); } 50% { transform: scale(1.2); color: #fff; } 100% { transform: scale(1); } }

        /* --- SIDEBAR & REWARDS --- */
        .gift-trigger { position: fixed; top: 15px; left: 20px; z-index: 1100; font-size: 24px; cursor: pointer; background: var(--card); width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        .sidebar { position: fixed; top: 0; left: -380px; width: 340px; height: 100%; background: var(--card); z-index: 1002; transition: 0.5s; padding: 100px 20px; border-right: 1px solid #334155; }
        .sidebar.open { left: 0; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1001; display: none; backdrop-filter: blur(4px); }
        .overlay.active { display: block; }

        .reward-card { background: linear-gradient(145deg, #1e293b, #0f172a); padding: 30px; border-radius: 24px; text-align: center; border: 1px solid var(--primary); }
        .btn-claim, .btn-gen { width: 100%; background: linear-gradient(90deg, #ff2e88, #ff6b6b); color: white; padding: 16px; border: none; border-radius: 18px; font-weight: 800; cursor: pointer; transition: 0.3s; margin-top: 15px; }
        .btn-claim:disabled { background: #334155; cursor: not-allowed; }

        /* --- ANIMATIONS --- */
        #status-msg { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); padding: 12px 24px; border-radius: 50px; background: var(--primary); color: white; font-weight: 700; opacity: 0; transition: 0.5s; z-index: 3000; }
        #status-msg.show { opacity: 1; bottom: 50px; }

        /* --- ONBOARDING --- */
        #onboarding-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.95); z-index: 2000; display: none; align-items: center; justify-content: center; }
        .setup-card { background: var(--card); width: 90%; max-width: 400px; padding: 40px; border-radius: 32px; text-align: center; border: 1px solid #334155; }
        .avatar-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 20px 0; }
        .avatar-option { width: 70px; height: 70px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; }
        .avatar-option.selected { border-color: var(--primary); transform: scale(1.1); }

        .container { margin: 120px auto 60px; max-width: 500px; padding: 0 20px; }
        input#p-input { width: 100%; padding: 18px; border-radius: 16px; border: 1px solid #334155; background: #0f172a; color: white; margin-bottom: 20px; outline: none; }
        .canvas { width: 100%; aspect-ratio: 1/1; background: #1e293b; border-radius: 24px; display: flex; align-items: center; justify-content: center; border: 2px dashed #475569; overflow: hidden; }
        #out-img { width: 100%; height: 100%; object-fit: cover; display: none; }
    </style>
</head>
<body>

<div id="status-msg">Action Successful!</div>

<div id="onboarding-overlay">
    <div class="setup-card">
        <h2>Welcome Bestie! ✨</h2>
        <div class="avatar-grid">
            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" class="avatar-option" onclick="selectAvatar(this.src, this)">
            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Aneka" class="avatar-option" onclick="selectAvatar(this.src, this)">
            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Max" class="avatar-option" onclick="selectAvatar(this.src, this)">
        </div>
        <input type="text" id="setup-name" placeholder="Your Name" style="width:100%; padding:12px; margin-bottom:15px; border-radius:10px; background:#0f172a; color:white; border:1px solid #334155;">
        <button class="btn-gen" onclick="saveProfile()">Start Creating</button>
    </div>
</div>

<div class="gift-trigger" onclick="toggleSidebar()">🎁</div>
<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<div class="top-bar">
    <div class="user-info">
        <img src="" id="nav-pfp" class="user-pfp">
        <div class="user-name" id="nav-user-name">Loading...</div>
    </div>
    <div id="cred-display" class="cred-badge">0 Credits</div>
</div>

<div class="sidebar" id="sidebar">
    <div class="reward-card">
        <div style="font-size: 50px;">💎</div>
        <h2 style="margin: 10px 0;">Daily Reward</h2>
        <p id="timer-text" style="color:#94a3b8; font-size:14px;">Checking status...</p>
        <button class="btn-claim" id="claim-btn" onclick="claimReward()">Claim +5 Credits</button>
    </div>
</div>

<div class="container">
    <input type="text" id="p-input" placeholder="Describe your vision...">
    <button class="btn-gen" id="gen-btn" onclick="generate()">Generate (5 Credits)</button>
    <div class="canvas" id="canvas">
        <img src="" id="out-img">
        <p id="ph-text">Your art will appear here</p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, updateDoc, setDoc, increment, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDr6R3e_oGeLb02blsH2l9cDJZZBwVegOk",
        authDomain: "imagebit-8fe75.firebaseapp.com",
        projectId: "imagebit-8fe75",
        storageBucket: "imagebit-8fe75.appspot.com",
        appId: "1:326104098599:web:f2d3447a6211f2104e6b02"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUser = null;
    let selectedPfp = "";

    onAuthStateChanged(auth, async (user) => {
        if (!user) { window.location.href = "login.html"; return; }
        currentUser = user;
        const snap = await getDoc(doc(db, "users", user.uid));
        if (snap.exists()) {
            refreshUI(snap.data());
        } else {
            document.getElementById('onboarding-overlay').style.display = 'flex';
        }
    });

    function showToast(text) {
        const msg = document.getElementById('status-msg');
        msg.innerText = text;
        msg.classList.add('show');
        setTimeout(() => msg.classList.remove('show'), 3000);
    }

    function refreshUI(data) {
        document.getElementById('nav-user-name').innerText = data.displayName;
        document.getElementById('nav-pfp').src = data.pfp;
        const creds = document.getElementById('cred-display');
        creds.innerText = `${data.credits || 0} Credits`;
        creds.classList.add('pulse');
        setTimeout(() => creds.classList.remove('pulse'), 600);

        // Timer Logic
        const last = data.lastClaimed ? data.lastClaimed.toMillis() : 0;
        const wait = 24 * 60 * 60 * 1000;
        const diff = Date.now() - last;

        if (diff < wait) {
            const hours = Math.ceil((wait - diff) / (1000 * 60 * 60));
            document.getElementById('timer-text').innerText = `Next claim in ${hours}h`;
            document.getElementById('claim-btn').disabled = true;
            document.getElementById('claim-btn').innerText = "Locked";
        } else {
            document.getElementById('timer-text').innerText = "Ready to boost!";
            document.getElementById('claim-btn').disabled = false;
        }
    }

    window.selectAvatar = (url, el) => {
        selectedPfp = url;
        document.querySelectorAll('.avatar-option').forEach(i => i.classList.remove('selected'));
        el.classList.add('selected');
    };

    window.saveProfile = async () => {
        const name = document.getElementById('setup-name').value;
        if (!name || !selectedPfp) return showToast("Pick a name and avatar!");
        await setDoc(doc(db, "users", currentUser.uid), {
            displayName: name, pfp: selectedPfp, credits: 10, lastClaimed: serverTimestamp()
        }, { merge: true });
        location.reload();
    };

    window.claimReward = async () => {
        const btn = document.getElementById('claim-btn');
        btn.disabled = true;
        btn.innerText = "Claiming...";
        
        try {
            await updateDoc(doc(db, "users", currentUser.uid), {
                credits: increment(5),
                lastClaimed: serverTimestamp()
            });
            showToast("Reward Claimed! +5 Credits 🎁");
            // Auto refresh data
            const updated = await getDoc(doc(db, "users", currentUser.uid));
            refreshUI(updated.data());
        } catch (e) {
            showToast("Error. Try later!");
            btn.disabled = false;
        }
    };

    window.generate = async () => {
        const prompt = document.getElementById('p-input').value;
        if (!prompt) return;

        const snap = await getDoc(doc(db, "users", currentUser.uid));
        if (snap.data().credits < 5) return showToast("Need more credits!");

        const btn = document.getElementById('gen-btn');
        btn.innerText = "Magic in progress...";
        btn.disabled = true;

        const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?width=1024&height=1024&nologo=true`;
        document.getElementById('out-img').src = url;
        document.getElementById('out-img').onload = async () => {
            document.getElementById('out-img').style.display = "block";
            document.getElementById('ph-text').style.display = "none";
            await updateDoc(doc(db, "users", currentUser.uid), { credits: increment(-5) });
            const updated = await getDoc(doc(db, "users", currentUser.uid));
            refreshUI(updated.data());
            btn.disabled = false;
            btn.innerText = "Generate (5 Credits)";
            showToast("Masterpiece Created! -5 Credits");
        };
    };

    window.toggleSidebar = () => {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('overlay').classList.toggle('active');
    };
</script>

</body>
</html>
