<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImageBIT AI | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://js.stripe.com/v3/"></script>

    <style>
        :root {
            --primary: #ff2e88;
            --primary-hover: #e62577;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --indigo: #6366f1;
            --success: #10b981;
        }

        /* 1. AUTH GUARD CLOAK */
        #auth-guard { display: none; }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text-main); overflow-x: hidden; }

        /* Navigation */
        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1rem 5%; background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px); position: fixed; width: 100%; top: 0; z-index: 100;
            border-bottom: 1px solid var(--border);
        }
        .credit-count { font-weight: 800; color: var(--primary); background: rgba(255, 46, 136, 0.1); padding: 6px 14px; border-radius: 10px; }
        .logout-btn { background: none; border: 1px solid var(--border); padding: 8px 15px; border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 0.85rem; }

        /* Main UI */
        .container { margin: 120px auto 60px; max-width: 700px; padding: 0 20px; text-align: center; }
        .generator-card { background: white; padding: 30px; border-radius: 24px; border: 1px solid var(--border); box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        input, select { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 15px; outline: none; }
        .btn-generate { width: 100%; background: var(--text-main); color: white; padding: 16px; border: none; border-radius: 14px; font-weight: 700; cursor: pointer; }

        /* Rewards Sidebar */
        .reward-fab {
            position: fixed; bottom: 30px; right: 30px;
            width: 60px; height: 60px; background: var(--primary);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: 0 10px 20px rgba(255, 46, 136, 0.3);
            z-index: 200; animation: bounce 2s infinite; font-size: 24px;
        }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .sidebar {
            position: fixed; top: 0; right: -400px; width: 380px; height: 100%;
            background: white; box-shadow: -10px 0 30px rgba(0,0,0,0.1);
            z-index: 1000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 40px 30px; overflow-y: auto;
        }
        .sidebar.open { right: 0; }
        .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(2px); z-index: 999; }

        .quest-card { background: #f8fafc; border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 15px; }
        .btn-claim { width: 100%; background: var(--indigo); color: white; border: none; padding: 10px; border-radius: 8px; font-weight: 700; cursor: pointer; margin-top: 10px; }
        .btn-claim:disabled { background: var(--border); color: var(--text-muted); cursor: not-allowed; }

        /* Payment Modal */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 2000; justify-content: center; align-items: center; }
        .modal { background: white; padding: 35px; border-radius: 28px; width: 100%; max-width: 440px; text-align: center; }
        #card-element { margin: 20px 0; padding: 15px; border: 1px solid var(--border); border-radius: 12px; text-align: left; }
    </style>
</head>
<body>

<div id="auth-guard">
    <div class="top-bar">
        <div style="font-weight: 800; font-size: 1.2rem;">ImageBIT AI</div>
        <div style="display: flex; gap: 10px; align-items: center;">
            <span class="credit-count" id="display-credits">...</span>
            <button onclick="openPayment()" style="background:var(--primary); color:white; border:none; padding:8px 15px; border-radius:10px; font-weight:700; cursor:pointer;">Buy</button>
            <button class="logout-btn" onclick="handleLogout()">Logout</button>
        </div>
    </div>

    <div class="container">
        <div class="generator-card">
            <input type="text" id="prompt-input" placeholder="A futuristic city in the style of cyberpunk...">
            <select id="quality-select">
                <option value="5">Standard (5 Credits)</option>
                <option value="10">Ultra HD (10 Credits)</option>
            </select>
            <button class="btn-generate" onclick="handleGenerate()" id="gen-btn">Generate Image</button>
        </div>
        <div id="status-container" style="margin-top: 30px; color: var(--text-muted);">Ready to create masterpieces.</div>
    </div>

    <div class="reward-fab" onclick="toggleSidebar()">🎁</div>

    <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>
    <div class="sidebar" id="reward-sidebar">
        <h2>Rewards Center</h2>
        <p style="color: var(--text-muted); margin-bottom: 25px;">Earn credits for being active!</p>

        <div class="quest-card">
            <div style="display:flex; justify-content:space-between;"><b>Daily Bonus</b> <span style="color:var(--success)">+5</span></div>
            <button class="btn-claim" id="daily-claim-btn" onclick="claimDailyReward()">Claim Now</button>
        </div>

        <div class="quest-card">
            <div style="display:flex; justify-content:space-between;"><b>First Masterpiece</b> <span style="color:var(--success)">+10</span></div>
            <button class="btn-claim" id="quest-first-gen" disabled>Claim Quest</button>
        </div>
    </div>

    <div class="modal-overlay" id="payment-modal">
        <div class="modal">
            <h2>Refill Credits</h2>
            <p style="color:var(--text-muted)">Secure Meezan Bank payment</p>
            <div id="card-element"></div>
            <button class="btn-generate" onclick="processPayment()" id="pay-btn" style="background:var(--indigo)">Pay $5.00 (100 Credits)</button>
            <p onclick="closePayment()" style="margin-top:15px; cursor:pointer; font-size: 0.9rem;">Close</p>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDr6R3e_oGeLb02blsH2l9cDJZZBwVegOk",
        authDomain: "imagebit-8fe75.firebaseapp.com",
        projectId: "imagebit-8fe75",
        storageBucket: "imagebit-8fe75.appspot.com",
        messagingSenderId: "326104098599",
        appId: "1:326104098599:web:f2d3447a6211f2104e6b02"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const stripe = Stripe('YOUR_STRIPE_PUBLISHABLE_KEY'); 
    const elements = stripe.elements();
    const card = elements.create('card');

    // --- 1. AUTH REDIRECTION & SYNC ---
    onAuthStateChanged(auth, async (user) => {
        if (!user) {
            window.location.href = "login.html"; 
        } else {
            document.getElementById('auth-guard').style.display = 'block';
            await syncUserData(user);
        }
    });

    async function syncUserData(user) {
        const userRef = doc(db, "users", user.uid);
        const snap = await getDoc(userRef);
        const today = new Date().toLocaleDateString();

        if(!snap.exists()) {
            // NEW USER: Gift 30 Credits
            const initialData = { 
                credits: 30, lastBonusDate: "", imagesGenerated: 0, 
                claimedFirstGen: false, email: user.email 
            };
            await setDoc(userRef, initialData);
            updateUI(30);
        } else {
            const data = snap.data();
            updateUI(data.credits);
            
            // Check Daily Button
            const dBtn = document.getElementById('daily-claim-btn');
            if(data.lastBonusDate === today) {
                dBtn.innerText = "Claimed";
                dBtn.disabled = true;
            }

            // Check Quests
            const qBtn = document.getElementById('quest-first-gen');
            if(data.claimedFirstGen) {
                qBtn.innerText = "Claimed ✅";
            } else if (data.imagesGenerated >= 1) {
                qBtn.disabled = false;
                qBtn.onclick = () => claimQuest('claimedFirstGen', 10);
            }
        }
    }

    function updateUI(val) { document.getElementById('display-credits').innerText = `${val} Credits`; }

    window.handleLogout = () => {
        signOut(auth).then(() => { window.location.href = "login.html"; });
    };

    window.toggleSidebar = () => {
        document.getElementById('reward-sidebar').classList.toggle('open');
        document.getElementById('sidebar-overlay').style.display = 
            document.getElementById('reward-sidebar').classList.contains('open') ? 'block' : 'none';
    };

    window.claimDailyReward = async () => {
        const user = auth.currentUser;
        const today = new Date().toLocaleDateString();
        await updateDoc(doc(db, "users", user.uid), { credits: increment(5), lastBonusDate: today });
        alert("+5 Credits Claimed!");
        location.reload();
    };

    window.claimQuest = async (key, reward) => {
        const upd = { credits: increment(reward) };
        upd[key] = true;
        await updateDoc(doc(db, "users", auth.currentUser.uid), upd);
        alert(`Quest Reward: +${reward} Credits!`);
        location.reload();
    };

    window.handleGenerate = async () => {
        const cost = parseInt(document.getElementById('quality-select').value);
        const userRef = doc(db, "users", auth.currentUser.uid);
        const snap = await getDoc(userRef);

        if(snap.data().credits < cost) return alert("Low balance!");

        await updateDoc(userRef, { credits: increment(-cost), imagesGenerated: increment(1) });
        updateUI(snap.data().credits - cost);
        document.getElementById('status-container').innerText = "Request sent to AI queue...";
    };

    // Stripe
    window.openPayment = () => { document.getElementById('payment-modal').style.display = 'flex'; card.mount('#card-element'); };
    window.closePayment = () => document.getElementById('payment-modal').style.display = 'none';
    window.processPayment = async () => {
        const {token, error} = await stripe.createToken(card);
        if(!error) {
            await updateDoc(doc(db, "users", auth.currentUser.uid), { credits: increment(100) });
            alert("100 Credits Added!");
            location.reload();
        }
    };
</script>
</body>
</html>
