<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImageBIT AI | v4 PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ff2e88; --accent: #3b82f6; --bg: #f8fafc; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: #1e293b; overflow: hidden; }

        /* Premium Navbar */
        .top-bar { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 5%; height: 80px; background: white; border-bottom: 1px solid #e2e8f0; 
            position: fixed; width: 100%; top: 0; z-index: 100; 
        }
        .user-info { display: flex; align-items: center; gap: 12px; margin-left: 60px; }
        .user-pfp { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--primary); padding: 2px; background: white; }
        .user-name { font-weight: 800; font-size: 0.95rem; line-height: 1; }
        .version-tag { font-size: 10px; color: var(--primary); font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }

        /* Sidebar & Flying Tick */
        .gift-trigger { position: fixed; top: 18px; left: 20px; z-index: 1001; font-size: 24px; cursor: pointer; background: white; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); transition: 0.3s; }
        .gift-trigger:hover { transform: scale(1.1); }
        .sidebar { position: fixed; top: 0; left: -350px; width: 320px; height: 100%; background: white; z-index: 1002; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); padding: 110px 25px; border-right: 1px solid #e2e8f0; }
        .sidebar.open { left: 0; }

        /* The Reward Box */
        .reward-card { 
            background: linear-gradient(135deg, #fff5f9 0%, #ffffff 100%); 
            padding: 30px 20px; border-radius: 24px; text-align: center; 
            border: 1px solid #ffebf3; position: relative; overflow: hidden;
        }
        #tick-icon { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); 
            font-size: 80px; opacity: 0; transition: 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); pointer-events: none; z-index: 10;
        }
        .tick-fly { transform: translate(-50%, -50%) scale(1.2) !important; opacity: 1 !important; }

        /* Buttons & Inputs */
        .claim-btn { 
            width: 100%; background: var(--primary); color: white; padding: 16px; 
            border: none; border-radius: 14px; font-weight: 800; cursor: pointer; transition: 0.3s;
        }
        .claim-btn:disabled { background: #cbd5e1; cursor: not-allowed; }
        #timer-text { font-size: 13px; color: #64748b; font-weight: 600; margin-top: 10px; display: none; }

        .container { margin: 140px auto; max-width: 500px; text-align: center; padding: 0 20px; }
        .credits-pill { display: inline-block; background: #1e293b; color: white; padding: 10px 20px; border-radius: 100px; font-weight: 800; font-size: 1.1rem; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="gift-trigger" onclick="toggleSidebar()">🎁</div>

<div class="top-bar">
    <div class="user-info">
        <img src="" id="nav-pfp" class="user-pfp">
        <div>
            <div class="user-name" id="nav-user-name">Guest User</div>
            <span class="version-tag">ImageBIT v4 PRO</span>
        </div>
    </div>
    <div id="cred-display" style="font-weight:900; color:var(--primary); padding-right:5%;">... Credits</div>
</div>

<div class="sidebar" id="sidebar">
    <div class="reward-card">
        <div id="tick-icon">✅</div>
        <div id="reward-ui">
            <h2 style="margin-bottom:8px; font-weight:800;">Daily Gift</h2>
            <p style="font-size:14px; color:#64748b; margin-bottom:20px;">Get 5 Credits every 24 hours to keep creating.</p>
            <button class="claim-btn" id="claim-btn" onclick="processClaim()">Claim Reward</button>
            <div id="timer-text">Next claim in: <span id="countdown">--:--:--</span></div>
        </div>
    </div>
</div>

<div class="container">
    <div class="credits-pill" id="main-credits">-- Credits</div>
    <h1 style="font-weight:900; font-size:2.5rem; letter-spacing:-1px;">Welcome back.</h1>
    <p style="color:#64748b; margin-top:10px;">Your ImageBIT v4 dashboard is ready.</p>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, updateDoc, increment, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDr6R3e_oGeLb02blsH2l9cDJZZBwVegOk",
        authDomain: "imagebit-8fe75.firebaseapp.com",
        projectId: "imagebit-8fe75",
        appId: "1:326104098599:web:f2d3447a6211f2104e6b02"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    onAuthStateChanged(auth, async (user) => {
        if (!user) { window.location.href = "login.html"; return; }
        
        const snap = await getDoc(doc(db, "users", user.uid));
        if (snap.exists()) {
            const data = snap.data();
            updateUI(data);
            checkCooldown(data.lastClaim);
        }
    });

    function updateUI(data) {
        const pfp = data.pfp || `https://api.dicebear.com/7.x/avataaars/svg?seed=${auth.currentUser.uid}`;
        document.getElementById('nav-user-name').innerText = data.displayName || "Artist";
        document.getElementById('nav-pfp').src = pfp;
        document.getElementById('cred-display').innerText = data.credits + " Credits";
        document.getElementById('main-credits').innerText = data.credits + " Credits Available";
    }

    window.toggleSidebar = () => document.getElementById('sidebar').classList.toggle('open');

    function checkCooldown(lastClaim) {
        if (!lastClaim) return;
        
        const now = Date.now();
        const lastClaimTime = lastClaim.toMillis();
        const waitTime = 24 * 60 * 60 * 1000; // 24 Hours
        
        if (now - lastClaimTime < waitTime) {
            const btn = document.getElementById('claim-btn');
            btn.disabled = true;
            btn.innerText = "Claimed Today";
            document.getElementById('timer-text').style.display = "block";
            startTimer(lastClaimTime + waitTime);
        }
    }

    function startTimer(targetTime) {
        const timer = setInterval(() => {
            const now = Date.now();
            const diff = targetTime - now;
            if (diff <= 0) {
                clearInterval(timer);
                location.reload();
                return;
            }
            const h = Math.floor(diff / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            document.getElementById('countdown').innerText = `${h}h ${m}m ${s}s`;
        }, 1000);
    }

    window.processClaim = async () => {
        const userRef = doc(db, "users", auth.currentUser.uid);
        try {
            await updateDoc(userRef, { 
                credits: increment(5),
                lastClaim: serverTimestamp() 
            });
            
            // Trigger Flying Tick Animation
            document.getElementById('reward-ui').style.opacity = '0';
            document.getElementById('tick-icon').classList.add('tick-fly');
            
            setTimeout(() => location.reload(), 1500);
        } catch (e) {
            alert("Error claiming reward. Try again later.");
        }
    };
</script>
</body>
</html>
